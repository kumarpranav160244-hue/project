<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Quiz</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>Interactive Quiz</h1>

    <div id="quiz">

        <div class="question">
            <h2>1. What is mental healt ?</h2>

            <label>
                <input type="radio" name="q1" value="0">
                Only the absence of illness
            </label>

            <label>
                <input type="radio" name="q1" value="0">
                Physical fitness only
            </label>

            <label>
                <input type="radio" name="q1" value="10">
                Emotional, psychological, and social well-being
            </label>

            <label>
                <input type="radio" name="q1" value="0">
                Intelligence level
            </label>
        </div>

        <div class="question">
            <h2>2. Which activity can help reduce stress?</h2>

            <label>
                <input type="radio" name="q2" value="10">
                Regular exercise
            </label>

            <label>
                <input type="radio" name="q2" value="0">
                Skipping meals
            </label>

            <label>
                <input type="radio" name="q2" value="0">
                Staying awake all night
            </label>

            <label>
                <input type="radio" name="q2" value="0">
                Ignoring your emotions
            </label>
        </div>

        <div class="question">
            <h2>3.   Which of these is a common sign of stress?  </h2>

            <label>
                <input type="radio" name="q3" value="0">
                Better concentration
            </label>

            <label>
                <input type="radio" name="q3" value="0">
                Constant relaxation
            </label>

            <label>
                <input type="radio" name="q3" value="10">
                Headaches and irritability
            </label>

            <label>
                <input type="radio" name="q3" value="0">
                Increased energy all the time
            </label>
        </div>

        <button onclick="checkQuiz()">Submit Quiz</button>

    </div>

    <div id="result"></div>

</div>

<script src="script.js"></script>

</body>
</html>
